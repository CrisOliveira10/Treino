<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catálogo</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e9e9e9;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* Área de zoom — recebe todos os eventos de toque */
#zoom-container {
  width: 95vw;
  max-width: 420px;
  height: calc(100vh - 70px); /* espaço para os botões */
  overflow: hidden;
  touch-action: none;   /* ← essencial: impede o browser de interceptar toques */
  position: relative;
  cursor: grab;
}
#zoom-container:active { cursor: grabbing; }

/* Flipbook */
#book {
  width: 100%;
  height: 100%;
  transform-origin: center center;
  /* sem transition aqui — o zoom em tempo real não pode ter lag */
}

/* Páginas */
.page {
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
}
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

/* Botões */
.controls {
  position: fixed;
  bottom: 12px;
  display: flex;
  gap: 20px;
  z-index: 10;
}
.controls button {
  border: none;
  background: #333;
  color: white;
  font-size: 20px;
  padding: 10px 22px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.controls button:active { background: #555; }

/* Indicador de zoom (aparece quando ampliado) */
#zoom-badge {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.08em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
#zoom-badge.visible { opacity: 1; }

/* Botão de reset zoom */
#zoom-reset {
  position: fixed;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  font-size: 13px;
  padding: 5px 11px;
  border-radius: 20px;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
#zoom-reset.visible { opacity: 1; pointer-events: auto; }

/* ══════════════════════════════════════
   BOTÃO DE MÚSICA — canto superior esquerdo
   Acima da área do livro, sempre visível
══════════════════════════════════════ */
#btn-music {
  position: fixed;
  top: 8px;
  left: 14px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  border: 2px solid rgba(255,255,255,0.5);
  color: white;
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: background 0.2s, opacity 0.2s;
  animation: musicPulse 1.6s ease-in-out infinite;
}
#btn-music:hover        { background: rgba(0,0,0,0.8); }
#btn-music.muted        { animation: none; opacity: 0.45; }

/* Pulse bem visível: anel branco expandindo */
@keyframes musicPulse {
  0%   { box-shadow: 0 0 0  0px rgba(255,255,255,0.9); }
  70%  { box-shadow: 0 0 0 16px rgba(255,255,255,0.0); }
  100% { box-shadow: 0 0 0  0px rgba(255,255,255,0.0); }
}

/* ══════════════════════════════════════
   CAMADA DE HOTSPOTS
   Sobreposta ao zoom-container,
   acompanha o book quando há zoom
══════════════════════════════════════ */
#hotspot-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  transform-origin: center center;
}

/* Grupo por página — oculto por padrão */
.hotspot-group {
  display: none;
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.hotspot-group.active {
  display: block;
}

/*
  ══════════════════════════════════════
  HOTSPOT — botão de vidro clicável

  Posição em % para ser proporcional
  em qualquer tamanho de tela.
  ══════════════════════════════════════
*/
.hotspot-btn {
  position: absolute;
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  padding: 0;
  /* Efeito de vidro (glassmorphism) */
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 40px;
  box-shadow:
    0 4px 18px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.35);
  /* Altura e padding via inline style ou abaixo */
  padding: 11px 20px;
  transition: background 0.2s, box-shadow 0.2s;

  /* Pulse suave */
  animation: hotPulse 2.2s ease-in-out infinite;
}
.hotspot-btn:active {
  background: rgba(255,255,255,0.32);
  transform: scale(0.97);
}

@keyframes hotPulse {
  0%, 100% { box-shadow: 0 4px 18px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.35); }
  50%       { box-shadow: 0 4px 28px rgba(255,255,255,0.35), inset 0 1px 0 rgba(255,255,255,0.35); }
}

/* Ícone dentro do botão de vidro */
.hotspot-icon {
  font-size: 20px;
  flex-shrink: 0;
  line-height: 1;
}

/* Texto do botão de vidro */
.hotspot-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  pointer-events: none;
  white-space: nowrap;
}

/*
  ✏️ VISIBILIDADE — para calibrar posição:
  Mude background do .hotspot-btn para rgba(255,0,0,0.4)
  e descomente o outline abaixo para ver a área exata.
  Depois volte ao original.
*/
/* .hotspot-btn { outline: 2px dashed red; } */
</style>
</head>
<body>

<!-- ══ BOTÃO DE MÚSICA — canto superior esquerdo ══ -->
<button id="btn-music" title="Som">♪</button>

<div id="zoom-container">
  <div id="book">
    <!-- ✏️ Adicione ou remova páginas aqui -->
    <div class="page"><img src="pages/1.jpg" alt="Página 1"></div>
    <div class="page"><img src="pages/2.jpg" alt="Página 2"></div>
    <div class="page"><img src="pages/3.jpg" alt="Página 3"></div>
    <div class="page"><img src="pages/4.jpg" alt="Página 4"></div>
    <div class="page"><img src="pages/5.jpg" alt="Página 5"></div>
    <div class="page"><img src="pages/6.jpg" alt="Página 6"></div>
    <div class="page"><img src="pages/7.jpg" alt="Página 7"></div>
    <div class="page"><img src="pages/8.jpg" alt="Página 8"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       CAMADA DE HOTSPOTS
       Fica dentro do zoom-container para acompanhar o zoom
  ══════════════════════════════════════════════════════ -->
  <div id="hotspot-layer">

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║   ✏️  HOTSPOTS — COMO CONFIGURAR                         ║
    ╠══════════════════════════════════════════════════════════╣
    ║                                                          ║
    ║  • data-page="5"  → página em que o grupo aparece       ║
    ║                     mude este número para trocar a pág.  ║
    ║                                                          ║
    ║  • style="top:X%; left:Y%; width:Z%"                    ║
    ║      top   = distância do topo da página em %           ║
    ║      left  = distância da esquerda em %                 ║
    ║      width = largura do botão em %                      ║
    ║                                                          ║
    ║  • href="..."  → link que abre ao clicar                ║
    ║      WhatsApp: https://wa.me/5571993233142              ║
    ║      Maps:     cole o link do Google Maps               ║
    ║                                                          ║
    ║  • Para calibrar a posição, adicione temporariamente:   ║
    ║      style="... ; outline:2px dashed red"               ║
    ║    no elemento .hotspot-btn                              ║
    ║                                                          ║
    ╚══════════════════════════════════════════════════════════╝
    -->

    <!-- ══ GRUPO PÁGINA 5 ══════════════════════════════════
         ✏️ Mude data-page para trocar de página
    ═════════════════════════════════════════════════════ -->
    <div class="hotspot-group" data-page="5">

      <!-- BOTÃO 1 — Confirmar Presença (WhatsApp) -->
      <!-- ✏️ Ajuste top/left/width para alinhar com sua arte -->
      <a class="hotspot-btn"
         href="https://wa.me/5571993233142"
         target="_blank"
         style="top: 41%; left: 6%; width: 88%;">
        <span class="hotspot-icon">✅</span>
        <span class="hotspot-label">Confirmar Presença</span>
      </a>

      <!-- BOTÃO 2 — Ver Local (Google Maps) -->
      <!-- ✏️ Ajuste top/left/width para alinhar com sua arte -->
      <a class="hotspot-btn"
         href="https://maps.app.goo.gl/az4F91tWrhgbCHjw6"
         target="_blank"
         style="top: 54%; left: 6%; width: 88%;">
        <span class="hotspot-icon">📍</span>
        <span class="hotspot-label">Ver Local</span>
      </a>

    </div>
    <!-- FIM GRUPO PÁGINA 5 -->

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  ✏️  MODELO PARA ADICIONAR HOTSPOTS EM OUTRA PÁGINA:     ║
    ╠══════════════════════════════════════════════════════════╣
    ║                                                          ║
    ║  <div class="hotspot-group" data-page="NUMERO_DA_PAGINA">║
    ║    <a class="hotspot-btn"                                ║
    ║       href="https://seu-link.com"                        ║
    ║       target="_blank"                                    ║
    ║       style="top: 45%; left: 6%; width: 88%;">           ║
    ║      <span class="hotspot-icon">🔗</span>                ║
    ║      <span class="hotspot-label">Texto do Botão</span>   ║
    ║    </a>                                                  ║
    ║  </div>                                                  ║
    ║                                                          ║
    ╚══════════════════════════════════════════════════════════╝
    -->

  </div><!-- /hotspot-layer -->

</div><!-- /zoom-container -->

<div class="controls">
  <button id="prev">◀</button>
  <button id="next">▶</button>
</div>

<div id="zoom-badge">1×</div>
<button id="zoom-reset">✕ zoom</button>

<audio id="flipSound" src="music.mp3" preload="auto"></audio>

<script>
/* ============================================================
   FLIPBOOK
   ============================================================ */
const pageFlip = new St.PageFlip(
  document.getElementById("book"),
  {
    width: 400,
    height: 700,
    size: "stretch",
    minWidth: 300,
    maxWidth: 600,
    minHeight: 400,
    maxHeight: 900,
    maxShadowOpacity: 0.5,
    showCover: false,
    mobileScrollSupport: false,
    useMouseEvents: true,
  }
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

/* Som de virar página */
const sound = document.getElementById("flipSound");
pageFlip.on("flip", () => {
  try { sound.currentTime = 0; sound.play(); } catch(e) {}
});

/* Botões de navegação — só funcionam fora do zoom */
document.getElementById("next").onclick = () => { if (scale === 1) pageFlip.flipNext(); };
document.getElementById("prev").onclick = () => { if (scale === 1) pageFlip.flipPrev(); };

/* ============================================================
   ZOOM — pinch + duplo toque + arrastar
   ============================================================
   CORREÇÕES aplicadas vs versão anterior:
   1. touchmove usa { passive: false } → permite e.preventDefault()
   2. O zoom acumula a partir da escala atual (pinchStartScale)
      em vez de reiniciar do zero a cada gesto
   3. Zoom centrado no ponto médio dos dedos
   4. Limites de pan calculados para nunca mostrar área vazia
   ============================================================ */
const container = document.getElementById("zoom-container");
const book      = document.getElementById("book");
const badge     = document.getElementById("zoom-badge");
const resetBtn  = document.getElementById("zoom-reset");

const MIN_SCALE = 1;
const MAX_SCALE = 4;
const DBL_SCALE = 2.5; // zoom do duplo toque

let scale          = 1;
let posX           = 0;
let posY           = 0;
let isZoomed       = false;

// Estado do pinch
let pinching       = false;
let pinchStartDist  = 0;
let pinchStartScale = 1;   // ← escala no INÍCIO do pinch (não sempre 1)
let pinchOriginX   = 0;
let pinchOriginY   = 0;
let pinchStartPosX = 0;
let pinchStartPosY = 0;

// Estado do pan
let panning        = false;
let panStartX      = 0;
let panStartY      = 0;
let panOriginX     = 0;
let panOriginY     = 0;

// Duplo toque
let lastTapTime    = 0;
let lastTapX       = 0;
let lastTapY       = 0;

/* ── Helpers ── */
function getDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function getMid(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2,
  };
}

function clampPos(x, y, s) {
  const rect = container.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  // O livro tem transform-origin: center center
  // Offset de pan máximo para não mostrar fundo
  const maxX =  (w * (s - 1)) / 2;
  const minX = -(w * (s - 1)) / 2;
  const maxY =  (h * (s - 1)) / 2;
  const minY = -(h * (s - 1)) / 2;
  return {
    x: Math.min(maxX, Math.max(minX, x)),
    y: Math.min(maxY, Math.max(minY, y)),
  };
}

function applyTransform(animate) {
  if (animate) {
    book.style.transition = 'transform 0.3s ease';
    setTimeout(() => { book.style.transition = ''; }, 320);
  } else {
    book.style.transition = '';
  }
  book.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;

  // Badge e botão reset
  const show = scale > 1.05;
  badge.textContent = scale.toFixed(1).replace('.0', '') + '×';
  badge.classList.toggle('visible', show);
  resetBtn.classList.toggle('visible', show);
  isZoomed = show;

  // Bloqueia/libera flipbook
  if (show) {
    pageFlip.disable();
  } else {
    pageFlip.enable();
  }

  // Sincroniza camada de hotspots com o zoom
  const layer = document.getElementById('hotspot-layer');
  if (layer) {
    layer.style.transform   = book.style.transform;
    layer.style.pointerEvents = show ? 'none' : '';
  }
}

function resetZoom(animate = true) {
  scale = 1; posX = 0; posY = 0;
  applyTransform(animate);
}

resetBtn.addEventListener('click', () => resetZoom(true));

/* ── TOUCHSTART ── */
container.addEventListener('touchstart', e => {

  if (e.touches.length === 2) {
    // Início do pinch
    e.preventDefault();
    pinching        = true;
    panning         = false;
    pinchStartDist  = getDist(e.touches);
    pinchStartScale = scale;          // ← guarda escala atual!
    pinchStartPosX  = posX;
    pinchStartPosY  = posY;

    const mid = getMid(e.touches);
    const rect = container.getBoundingClientRect();
    pinchOriginX = mid.x - rect.left - rect.width  / 2;
    pinchOriginY = mid.y - rect.top  - rect.height / 2;

  } else if (e.touches.length === 1) {
    if (isZoomed) {
      // Início do pan
      panning    = true;
      panStartX  = e.touches[0].clientX;
      panStartY  = e.touches[0].clientY;
      panOriginX = posX;
      panOriginY = posY;
    }
  }

}, { passive: false });   // ← passive: false obrigatório!

/* ── TOUCHMOVE ── */
container.addEventListener('touchmove', e => {

  if (e.touches.length === 2 && pinching) {
    e.preventDefault();   // ← agora funciona porque passive: false

    const newDist = getDist(e.touches);
    const ratio   = newDist / pinchStartDist;
    // Acumula a partir da escala do início do pinch
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale * ratio));

    // Zoom centrado na origem do pinch
    const scaleDelta = newScale / scale;
    posX = pinchOriginX + scaleDelta * (pinchStartPosX - pinchOriginX);
    posY = pinchOriginY + scaleDelta * (pinchStartPosY - pinchOriginY);
    scale = newScale;

    const clamped = clampPos(posX, posY, scale);
    posX = clamped.x; posY = clamped.y;
    applyTransform(false);

  } else if (e.touches.length === 1 && panning && isZoomed) {
    e.preventDefault();
    const dx = e.touches[0].clientX - panStartX;
    const dy = e.touches[0].clientY - panStartY;
    const clamped = clampPos(panOriginX + dx, panOriginY + dy, scale);
    posX = clamped.x; posY = clamped.y;
    applyTransform(false);
  }

}, { passive: false });   // ← passive: false obrigatório!

/* ── TOUCHEND ── */
container.addEventListener('touchend', e => {
  if (e.touches.length < 2) {
    if (pinching) {
      pinching = false;
      // Se soltou com escala muito baixa, reseta
      if (scale < 1.1) resetZoom(true);
    }
  }
  if (e.touches.length === 0) panning = false;

  /* Duplo toque */
  if (e.changedTouches.length === 1) {
    const now = Date.now();
    const t   = e.changedTouches[0];
    const dt  = now - lastTapTime;
    const dx  = Math.abs(t.clientX - lastTapX);
    const dy  = Math.abs(t.clientY - lastTapY);

    if (dt < 300 && dx < 30 && dy < 30) {
      if (isZoomed) {
        resetZoom(true);
      } else {
        // Zoom centrado no ponto tocado
        const rect = container.getBoundingClientRect();
        const ox   = t.clientX - rect.left - rect.width  / 2;
        const oy   = t.clientY - rect.top  - rect.height / 2;
        scale = DBL_SCALE;
        posX  = ox - DBL_SCALE * ox;
        posY  = oy - DBL_SCALE * oy;
        const clamped = clampPos(posX, posY, scale);
        posX = clamped.x; posY = clamped.y;
        applyTransform(true);
      }
      lastTapTime = 0;
      return;
    }

    lastTapTime = now;
    lastTapX    = t.clientX;
    lastTapY    = t.clientY;
  }

}, { passive: true });

/* Inicializa áudio no primeiro toque */
document.addEventListener('touchstart', () => {
  try { sound.load(); } catch(e) {}
}, { once: true });

/* ============================================================
   MÚSICA DE FUNDO
   ── Toca flip.mp3 em loop contínuo
   ── Botão ♪ / 🔇 no canto superior esquerdo
   ── Inicia automaticamente na primeira interação
   ============================================================ */
const bgMusic      = document.getElementById("flipSound");
const btnMusic     = document.getElementById("btn-music");
let   musicOn      = false;
let   musicStarted = false;

bgMusic.loop   = true;   // toca em loop durante toda navegação
bgMusic.volume = 0.75;   // ✏️ volume: 0.0 (mudo) → 1.0 (máximo)

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  bgMusic.currentTime = 0;
  bgMusic.play()
    .then(() => { musicOn = true; syncMusicBtn(); })
    .catch(() => { /* autoplay bloqueado; usuário clica no botão */ });
}

function syncMusicBtn() {
  btnMusic.textContent = musicOn ? '♪' : '🔇';
  btnMusic.classList.toggle('muted', !musicOn);
}

btnMusic.addEventListener('click', () => {
  if (!musicStarted) { startMusic(); return; }
  if (musicOn) { bgMusic.pause(); musicOn = false; }
  else          { bgMusic.play();  musicOn = true;  }
  syncMusicBtn();
});

// Inicia na primeira interação (política dos browsers)
['touchstart', 'mousedown', 'keydown'].forEach(ev =>
  document.addEventListener(ev, startMusic, { once: true, passive: true })
);

/* ============================================================
   HOTSPOTS — mostra/oculta por página
   ── Atualiza ao virar página via evento "flip" do page-flip
   ── Transform e pointer-events sincronizados via applyTransform
   ============================================================ */
const hotspotGroups = document.querySelectorAll('.hotspot-group');

function updateHotspots(pageNumber) {
  hotspotGroups.forEach(g => {
    g.classList.toggle('active', parseInt(g.dataset.page, 10) === pageNumber);
  });
}

// Ouve virada de página para atualizar hotspots
pageFlip.on('flip', (e) => {
  updateHotspots(e.data + 1); // page-flip usa índice 0-based
});

// Inicializa na página 1
updateHotspots(1);
</script>
</body>
</html>
