<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
margin:0;
background:#e9e9e9;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

#book{
width:95vw;
max-width:420px;
height:92vh;
}

.page{
background:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
transform-origin:center center;
transition:transform .05s linear;
}

/* botões */

.controls{
position:fixed;
bottom:20px;
display:flex;
gap:20px;
}

button{
border:none;
background:#333;
color:white;
font-size:20px;
padding:10px 18px;
border-radius:6px;
}

</style>

</head>

<body>

<div id="book">

<div class="page"><img src="pages/1.jpg"></div>
<div class="page"><img src="pages/2.jpg"></div>
<div class="page"><img src="pages/3.jpg"></div>
<div class="page"><img src="pages/4.jpg"></div>
<div class="page"><img src="pages/5.jpg"></div>
<div class="page"><img src="pages/6.jpg"></div>

</div>

<div class="controls">
<button id="prev">◀</button>
<button id="next">▶</button>
</div>

<audio id="flipSound" src="flip.mp3"></audio>

<script>

/* FLIPBOOK */

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:400,
height:700,
size:"stretch",
minWidth:300,
maxWidth:600,
minHeight:400,
maxHeight:900,
showCover:false,
mobileScrollSupport:false,
maxShadowOpacity:0.5
}
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

/* som */

const sound=document.getElementById("flipSound");

pageFlip.on("flip",()=>{

sound.currentTime=0;
sound.play();

resetZoom();

});

/* botões */

document.getElementById("next").onclick=()=>{
if(scale===1) pageFlip.flipNext();
}

document.getElementById("prev").onclick=()=>{
if(scale===1) pageFlip.flipPrev();
}

/* ================= */
/* ZOOM PROFISSIONAL */
/* ================= */

let scale=1;
let posX=0;
let posY=0;
let startX=0;
let startY=0;
let startDistance=0;
let zooming=false;

/* imagem da página ativa */

function getActiveImage(){

const page=document.querySelector(".stf__item--active");

if(!page) return null;

return page.querySelector("img");

}

/* distância dedos */

function getDistance(touches){

const dx=touches[0].clientX-touches[1].clientX;
const dy=touches[0].clientY-touches[1].clientY;

return Math.sqrt(dx*dx+dy*dy);

}

/* aplicar zoom */

function applyTransform(img){

img.style.transform=
`translate(${posX}px,${posY}px) scale(${scale})`;

}

/* limitar movimento */

function clamp(value,min,max){
return Math.min(Math.max(value,min),max);
}

/* reset */

function resetZoom(){

scale=1;
posX=0;
posY=0;

document.querySelectorAll(".page img").forEach(img=>{
img.style.transform="scale(1)";
});

pageFlip.enable();

}

/* toque início */

document.addEventListener("touchstart",(e)=>{

const img=getActiveImage();
if(!img) return;

if(e.touches.length===2){

zooming=true;
startDistance=getDistance(e.touches);

pageFlip.disable();

}

if(e.touches.length===1 && scale>1){

startX=e.touches[0].clientX-posX;
startY=e.touches[0].clientY-posY;

}

});

/* movimento */

document.addEventListener("touchmove",(e)=>{

const img=getActiveImage();
if(!img) return;

/* pinch zoom */

if(e.touches.length===2){

e.preventDefault();

const newDistance=getDistance(e.touches);

let zoom=newDistance/startDistance;

scale=clamp(zoom,1,8);

applyTransform(img);

}

/* mover */

if(e.touches.length===1 && scale>1){

posX=e.touches[0].clientX-startX;
posY=e.touches[0].clientY-startY;

applyTransform(img);

}

});

/* fim gesto */

document.addEventListener("touchend",()=>{

if(zooming){

zooming=false;

}

});

/* duplo toque */

let lastTap=0;

document.addEventListener("touchend",(e)=>{

const now=new Date().getTime();
const tapLength=now-lastTap;

const img=getActiveImage();

if(tapLength<300 && tapLength>0 && img){

if(scale===1){

scale=2;
pageFlip.disable();

}else{

resetZoom();

}

applyTransform(img);

}

lastTap=now;

});

</script>

</body>
</html>
