<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
margin:0;
background:#e9e9e9;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* área do zoom */

#zoom-container{
width:95vw;
max-width:420px;
height:92vh;
overflow:hidden;
touch-action:none;
}

/* flipbook */

#book{
width:100%;
height:100%;
transform-origin:center center;
transition:transform 0.15s ease;
}

/* páginas */

.page{
background:white;
display:flex;
align-items:center;
justify-content:center;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}

/* botões */

.controls{
position:fixed;
bottom:20px;
display:flex;
gap:20px;
}

button{
border:none;
background:#333;
color:white;
font-size:20px;
padding:10px 18px;
border-radius:6px;
}

</style>

</head>

<body>

<div id="zoom-container">

<div id="book">

<div class="page"><img src="pages/1.jpg"></div>
<div class="page"><img src="pages/2.jpg"></div>
<div class="page"><img src="pages/3.jpg"></div>
<div class="page"><img src="pages/4.jpg"></div>
<div class="page"><img src="pages/5.jpg"></div>
<div class="page"><img src="pages/6.jpg"></div>

</div>

</div>

<div class="controls">
<button id="prev">◀</button>
<button id="next">▶</button>
</div>

<audio id="flipSound" src="flip.mp3"></audio>

<script>

/* inicia flipbook */

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:400,
height:700,
size:"stretch",
minWidth:300,
maxWidth:600,
minHeight:400,
maxHeight:900,
maxShadowOpacity:0.5,
showCover:false, /* remove capa dura */
mobileScrollSupport:false
}
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

/* som */

const sound=document.getElementById("flipSound");

pageFlip.on("flip",()=>{
sound.currentTime=0;
sound.play();
});

/* botões */

document.getElementById("next").onclick=()=>{
pageFlip.flipNext();
}

document.getElementById("prev").onclick=()=>{
pageFlip.flipPrev();
}

/* ZOOM COM GESTO */

const container=document.getElementById("zoom-container");
const book=document.getElementById("book");

let scale=1;
let startDistance=0;
let zooming=false;

/* distância entre dedos */

function getDistance(touches){
const dx=touches[0].clientX - touches[1].clientX;
const dy=touches[0].clientY - touches[1].clientY;
return Math.sqrt(dx*dx + dy*dy);
}

/* início do gesto */

container.addEventListener("touchstart",(e)=>{

if(e.touches.length===2){

zooming=true;
startDistance=getDistance(e.touches);

/* bloqueia virar página */

pageFlip.disable();

}

});

/* movimento */

container.addEventListener("touchmove",(e)=>{

if(e.touches.length===2){

e.preventDefault();

const newDistance=getDistance(e.touches);

let zoom=newDistance/startDistance;

scale=Math.min(Math.max(1,zoom),3);

book.style.transform="scale("+scale+")";

}

});

/* fim do gesto */

container.addEventListener("touchend",()=>{

if(zooming){

zooming=false;

/* reativa virada */

pageFlip.enable();

}

if(scale<1.05){

scale=1;
book.style.transform="scale(1)";

}

});

</script>

</body>
</html>
