<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>
body{
margin:0;
background:#e9e9e9;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
font-family:Arial, Helvetica, sans-serif;
}

.book{
position:relative;
width:92vw;
max-width:420px;
height:90vh;
perspective:2000px;
}

.page{
position:absolute;
width:100%;
height:100%;
transform-origin:left;
transition:transform 0.9s;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
border-radius:6px;
overflow:hidden;
background:white;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
background:white;
}

.page.flip{
transform:rotateY(-180deg);
}

.controls{
margin-top:10px;
}

button{
border:none;
background:#333;
color:white;
padding:10px 20px;
font-size:18px;
border-radius:6px;
margin:5px;
}
</style>

</head>

<body>

<div class="book">

<div class="page"><img src="pages/1.jpg"></div>
<div class="page"><img src="pages/2.jpg"></div>
<div class="page"><img src="pages/3.jpg"></div>
<div class="page"><img src="pages/4.jpg"></div>
<div class="page"><img src="pages/5.jpg"></div>
<div class="page"><img src="pages/6.jpg"></div>

</div>

<div class="controls">
<button id="prev">◀</button>
<button id="next">▶</button>
</div>

<audio id="flipSound" src="flip.mp3"></audio>

<script>
const pages=document.querySelectorAll(".page");
const next=document.getElementById("next");
const prev=document.getElementById("prev");
const sound=document.getElementById("flipSound");

let current=0;

function playSound(){
sound.currentTime=0;
sound.play();
}

next.onclick=function(){
if(current < pages.length){
pages[current].classList.add("flip");
playSound();
current++;
}
}

prev.onclick=function(){
if(current>0){
current--;
pages[current].classList.remove("flip");
playSound();
}
}
</script>

</body>
</html>
