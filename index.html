<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catálogo</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e9e9e9;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* ══════════════════════════════════════
   ÁREA DE ZOOM
══════════════════════════════════════ */
#zoom-container {
  width: 95vw;
  max-width: 420px;
  height: calc(100vh - 70px);
  overflow: hidden;
  touch-action: none;
  position: relative;
  cursor: grab;
}
#zoom-container:active { cursor: grabbing; }

/* ══════════════════════════════════════
   FLIPBOOK
══════════════════════════════════════ */
#book {
  width: 100%;
  height: 100%;
  transform-origin: center center;
}

/* ══════════════════════════════════════
   PÁGINAS
══════════════════════════════════════ */
.page {
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

/* ══════════════════════════════════════
   BOTÕES DE NAVEGAÇÃO
══════════════════════════════════════ */
.controls {
  position: fixed;
  bottom: 12px;
  display: flex;
  gap: 20px;
  z-index: 10;
}
.controls button {
  border: none;
  background: #333;
  color: white;
  font-size: 20px;
  padding: 10px 22px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.controls button:active { background: #555; }

/* ══════════════════════════════════════
   BOTÃO DE MÚSICA
   Posicionado acima da área do livro,
   canto superior esquerdo
══════════════════════════════════════ */
#btn-music {
  position: fixed;
  top: 8px;
  left: 14px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  border: 2px solid rgba(255,255,255,0.35);
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: background 0.2s, opacity 0.2s;
  animation: musicPulse 2.2s ease-in-out infinite;
}
#btn-music:hover        { background: rgba(0,0,0,0.75); animation-play-state: paused; }
#btn-music.muted        { animation: none; opacity: 0.5; }

@keyframes musicPulse {
  0%, 100% { box-shadow: 0 0 0 0   rgba(255,255,255,0.4); }
  50%       { box-shadow: 0 0 0 9px rgba(255,255,255,0.0); }
}

/* ══════════════════════════════════════
   ZOOM BADGE + RESET
══════════════════════════════════════ */
#zoom-badge {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.08em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
#zoom-badge.visible { opacity: 1; }

#zoom-reset {
  position: fixed;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  font-size: 13px;
  padding: 5px 11px;
  border-radius: 20px;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
#zoom-reset.visible { opacity: 1; pointer-events: auto; }

/* ══════════════════════════════════════
   CAMADA DE HOTSPOTS
   Fica sobre o zoom-container,
   acompanha o book no zoom via transform
══════════════════════════════════════ */
#hotspot-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  /* Mesma transform-origin do #book */
  transform-origin: center center;
}

/* Grupo de hotspots por página */
.hotspot-group {
  display: none;
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.hotspot-group.active {
  display: block;
}

/*
  ══════════════════════════════════════
  HOTSPOT — botão clicável sobre a arte

  Posição: top/left em % da altura/largura
  da área do livro.
  ══════════════════════════════════════
*/
.hotspot-btn {
  position: absolute;
  pointer-events: auto;
  display: flex;
  align-items: center;
  text-decoration: none;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 0;
  /* Área clicável ampla, sem visual próprio —
     a arte do Canva já tem o visual do botão */
  animation: hotPulse 2.4s ease-in-out infinite;
}
@keyframes hotPulse {
  0%, 100% { filter: drop-shadow(0 0 0px  rgba(255,255,255,0.0)); }
  50%       { filter: drop-shadow(0 0 10px rgba(255,255,255,0.6)); }
}

/* Inner: área clicável transparente alinhada */
.hotspot-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 12px 16px;
  border-radius: 40px;
  /* DEBUG: descomente para ver a área clicável */
  /* outline: 2px dashed red; */
}

/* Ícone circular */
.hotspot-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  pointer-events: none;
}

/* Texto */
.hotspot-label {
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #FFD700;
  text-shadow: 2px 2px 0 #6B0000;
  pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>

<!-- ══ BOTÃO DE MÚSICA — canto superior esquerdo ══ -->
<button id="btn-music" title="Música">🎵</button>

<div id="zoom-container">
  <div id="book">

    <!--
    ════════════════════════════════════════════════════════
    ✏️  PÁGINAS
    Adicione/remova <div class="page">...</div> aqui.
    ════════════════════════════════════════════════════════
    -->
    <div class="page"><img src="pages/1.jpg" alt="Página 1"></div>
    <div class="page"><img src="pages/2.jpg" alt="Página 2"></div>
    <div class="page"><img src="pages/3.jpg" alt="Página 3"></div>
    <div class="page"><img src="pages/4.jpg" alt="Página 4"></div>
    <div class="page"><img src="pages/5.jpg" alt="Página 5"></div>
    <div class="page"><img src="pages/6.jpg" alt="Página 6"></div>
    <div class="page"><img src="pages/7.jpg" alt="Página 7"></div>
    <div class="page"><img src="pages/8.jpg" alt="Página 8"></div>

  </div>

  <!-- ══ CAMADA DE HOTSPOTS ══ -->
  <div id="hotspot-layer">

    <!--
    ════════════════════════════════════════════════════════
    ✏️  HOTSPOTS — COMO CONFIGURAR:

    1. data-page="5"  → página em que aparece (número da página)
    2. style="top:X%; left:Y%; width:Z%"
         top   = distância do topo da página (%)
         left  = distância da esquerda (%)
         width = largura do botão (%)
    3. href → link que abre ao clicar
    4. Botão 1: ícone esquerda + texto  (padrão)
       Botão 2: texto + ícone direita   (flex-direction: row-reverse)
    5. Se não tiver ícone, remova a tag <img class="hotspot-icon">

    DICA: Para calibrar a posição, adicione temporariamente
    /* outline: 2px dashed red; */ no .hotspot-inner
    ════════════════════════════════════════════════════════
    -->

    <!-- ══ PÁGINA 5 — dois botões empilhados ══ -->
    <div class="hotspot-group" data-page="5">

      <!-- ✏️ BOTÃO 1 — ícone à esquerda + texto -->
      <a class="hotspot-btn"
         href="https://link-do-formulario.com"
         target="_blank"
         style="top: 41%; left: 6%; width: 88%;">
        <div class="hotspot-inner">
          <!-- ✏️ Remova a linha abaixo se não tiver ícone -->
          <img class="hotspot-icon" src="pages/icon1.png" alt="">
          <span class="hotspot-label">Confirmar</span>
        </div>
      </a>

      <!-- ✏️ BOTÃO 2 — texto + ícone à direita -->
      <a class="hotspot-btn"
         href="https://link-do-mapa.com"
         target="_blank"
         style="top: 54%; left: 6%; width: 88%; flex-direction: row-reverse;">
        <div class="hotspot-inner" style="flex-direction: row-reverse;">
          <!-- ✏️ Remova a linha abaixo se não tiver ícone -->
          <img class="hotspot-icon" src="pages/icon2.png" alt="">
          <span class="hotspot-label">Ver Mapa</span>
        </div>
      </a>

    </div>
    <!-- FIM PÁGINA 5 -->

    <!--
    ════════════════════════════════════════════════════════
    ✏️  MODELO PARA NOVAS PÁGINAS — copie e cole:

    <div class="hotspot-group" data-page="NUMERO">
      <a class="hotspot-btn"
         href="https://seu-link.com"
         target="_blank"
         style="top: 45%; left: 10%; width: 80%;">
        <div class="hotspot-inner">
          <img class="hotspot-icon" src="pages/icon.png" alt="">
          <span class="hotspot-label">Texto do Botão</span>
        </div>
      </a>
    </div>
    ════════════════════════════════════════════════════════
    -->

  </div><!-- /hotspot-layer -->

</div><!-- /zoom-container -->

<div class="controls">
  <button id="prev">◀</button>
  <button id="next">▶</button>
</div>

<div id="zoom-badge">1×</div>
<button id="zoom-reset">✕ zoom</button>

<!--
  ✏️ MÚSICA DE FUNDO
  Coloque seu arquivo na raiz do projeto.
  Troque "music.mp3" pelo nome do seu arquivo.
  Formatos aceitos: .mp3  .ogg  .wav
-->
<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

<script>
/* ============================================================
   FLIPBOOK
   ============================================================ */
const pageFlip = new St.PageFlip(
  document.getElementById("book"),
  {
    width: 400,
    height: 700,
    size: "stretch",
    minWidth: 300,
    maxWidth: 600,
    minHeight: 400,
    maxHeight: 900,
    maxShadowOpacity: 0.5,
    showCover: false,
    mobileScrollSupport: false,
    useMouseEvents: true,
  }
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

// Atualiza hotspots ao virar página
pageFlip.on("flip", (e) => {
  updateHotspots(e.data + 1); // page-flip é 0-based
});

// Botões de nav — só funcionam sem zoom
document.getElementById("next").onclick = () => { if (scale === 1) pageFlip.flipNext(); };
document.getElementById("prev").onclick = () => { if (scale === 1) pageFlip.flipPrev(); };

/* ============================================================
   MÚSICA DE FUNDO
   — Toca automaticamente na primeira interação
   — Botão no canto superior esquerdo liga/desliga
   ============================================================ */
const bgMusic      = document.getElementById("bgMusic");
const btnMusic     = document.getElementById("btn-music");
let   musicOn      = false;
let   musicStarted = false;

bgMusic.volume = 0.75; // ✏️ volume: 0.0 (mudo) → 1.0 (máximo)

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  bgMusic.play()
    .then(() => { musicOn = true; syncMusicBtn(); })
    .catch(() => { /* autoplay bloqueado; usuário deve clicar */ });
}

function syncMusicBtn() {
  if (musicOn) {
    btnMusic.textContent = '🎵';
    btnMusic.classList.remove('muted');
  } else {
    btnMusic.textContent = '🔇';
    btnMusic.classList.add('muted');
  }
}

btnMusic.addEventListener('click', () => {
  if (!musicStarted) { startMusic(); return; }
  if (musicOn) { bgMusic.pause(); musicOn = false; }
  else          { bgMusic.play();  musicOn = true;  }
  syncMusicBtn();
});

// Inicia na primeira interação do usuário (política dos browsers)
function onFirstInteraction() {
  startMusic();
  ['touchstart','mousedown','keydown'].forEach(ev =>
    document.removeEventListener(ev, onFirstInteraction)
  );
}
['touchstart','mousedown','keydown'].forEach(ev =>
  document.addEventListener(ev, onFirstInteraction, { once: true, passive: true })
);

/* ============================================================
   HOTSPOTS — mostra/oculta conforme página atual
   ============================================================ */
const hotspotGroups = document.querySelectorAll('.hotspot-group');

function updateHotspots(pageNumber) {
  hotspotGroups.forEach(g => {
    g.classList.toggle('active', parseInt(g.dataset.page, 10) === pageNumber);
  });
}

// Sincroniza hotspot-layer com o transform do #book
// para que os botões acompanhem o zoom
function syncHotspotLayer() {
  const layer = document.getElementById('hotspot-layer');
  layer.style.transform = book.style.transform || '';
}

// Página inicial
updateHotspots(1);

/* ============================================================
   ZOOM — pinch + duplo toque + arrastar
   ============================================================ */
const container = document.getElementById("zoom-container");
const book      = document.getElementById("book");
const badge     = document.getElementById("zoom-badge");
const resetBtn  = document.getElementById("zoom-reset");

const MIN_SCALE = 1;
const MAX_SCALE = 4;
const DBL_SCALE = 2.5;

let scale           = 1;
let posX            = 0;
let posY            = 0;
let isZoomed        = false;

let pinching        = false;
let pinchStartDist  = 0;
let pinchStartScale = 1;
let pinchOriginX    = 0;
let pinchOriginY    = 0;
let pinchStartPosX  = 0;
let pinchStartPosY  = 0;

let panning         = false;
let panStartX       = 0;
let panStartY       = 0;
let panOriginX      = 0;
let panOriginY      = 0;

let lastTapTime     = 0;
let lastTapX        = 0;
let lastTapY        = 0;

function getDist(t) {
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function clampPos(x, y, s) {
  const r  = container.getBoundingClientRect();
  const mx =  (r.width  * (s - 1)) / 2;
  const my =  (r.height * (s - 1)) / 2;
  return {
    x: Math.min(mx,  Math.max(-mx, x)),
    y: Math.min(my,  Math.max(-my, y)),
  };
}

function applyTransform(animate) {
  const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
  if (animate) {
    book.style.transition = 'transform 0.3s ease';
    setTimeout(() => { book.style.transition = ''; }, 320);
  } else {
    book.style.transition = '';
  }
  book.style.transform = tr;
  syncHotspotLayer();   // hotspots acompanham o zoom

  const show = scale > 1.05;
  badge.textContent = scale.toFixed(1).replace('.0','') + '×';
  badge.classList.toggle('visible', show);
  resetBtn.classList.toggle('visible', show);
  isZoomed = show;

  // Durante zoom: hotspots perdem pointer-events para não atrapalhar o pan
  document.getElementById('hotspot-layer').style.pointerEvents = show ? 'none' : '';

  if (show) { pageFlip.disable(); } else { pageFlip.enable(); }
}

function resetZoom(animate = true) {
  scale = 1; posX = 0; posY = 0;
  applyTransform(animate);
}

resetBtn.addEventListener('click', () => resetZoom(true));

/* ── TOUCHSTART ── */
container.addEventListener('touchstart', e => {
  startMusic(); // garante início da música ao tocar o livro

  if (e.touches.length === 2) {
    e.preventDefault();
    pinching        = true;
    panning         = false;
    pinchStartDist  = getDist(e.touches);
    pinchStartScale = scale;
    pinchStartPosX  = posX;
    pinchStartPosY  = posY;
    const r = container.getBoundingClientRect();
    pinchOriginX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - r.left - r.width  / 2;
    pinchOriginY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - r.top  - r.height / 2;

  } else if (e.touches.length === 1 && isZoomed) {
    panning    = true;
    panStartX  = e.touches[0].clientX;
    panStartY  = e.touches[0].clientY;
    panOriginX = posX;
    panOriginY = posY;
  }
}, { passive: false });

/* ── TOUCHMOVE ── */
container.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinching) {
    e.preventDefault();
    const newDist  = getDist(e.touches);
    const ratio    = newDist / pinchStartDist;
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale * ratio));
    const delta    = newScale / scale;
    posX  = pinchOriginX + delta * (pinchStartPosX - pinchOriginX);
    posY  = pinchOriginY + delta * (pinchStartPosY - pinchOriginY);
    scale = newScale;
    const c = clampPos(posX, posY, scale);
    posX = c.x; posY = c.y;
    applyTransform(false);

  } else if (e.touches.length === 1 && panning && isZoomed) {
    e.preventDefault();
    const c = clampPos(
      panOriginX + e.touches[0].clientX - panStartX,
      panOriginY + e.touches[0].clientY - panStartY,
      scale
    );
    posX = c.x; posY = c.y;
    applyTransform(false);
  }
}, { passive: false });

/* ── TOUCHEND ── */
container.addEventListener('touchend', e => {
  if (e.touches.length < 2 && pinching) {
    pinching = false;
    if (scale < 1.1) resetZoom(true);
  }
  if (e.touches.length === 0) panning = false;

  // Duplo toque
  if (e.changedTouches.length === 1) {
    const now = Date.now();
    const t   = e.changedTouches[0];
    const dt  = now - lastTapTime;
    const dx  = Math.abs(t.clientX - lastTapX);
    const dy  = Math.abs(t.clientY - lastTapY);

    if (dt < 300 && dx < 30 && dy < 30) {
      if (isZoomed) {
        resetZoom(true);
      } else {
        const r  = container.getBoundingClientRect();
        const ox = t.clientX - r.left - r.width  / 2;
        const oy = t.clientY - r.top  - r.height / 2;
        scale    = DBL_SCALE;
        posX     = ox - DBL_SCALE * ox;
        posY     = oy - DBL_SCALE * oy;
        const c  = clampPos(posX, posY, scale);
        posX = c.x; posY = c.y;
        applyTransform(true);
      }
      lastTapTime = 0;
      return;
    }
    lastTapTime = now;
    lastTapX    = t.clientX;
    lastTapY    = t.clientY;
  }
}, { passive: true });

// Desktop: inicia música ao clicar/arrastar também
container.addEventListener('mousedown', startMusic);
</script>
</body>
</html>
