<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
margin:0;
background:#e9e9e9;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* área do flipbook */

#book{
width:95vw;
max-width:420px;
height:92vh;
}

/* páginas */

.page{
background:white;
display:flex;
align-items:center;
justify-content:center;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}

/* botões */

.controls{
position:fixed;
bottom:20px;
display:flex;
gap:20px;
}

button{
border:none;
background:#333;
color:white;
font-size:20px;
padding:10px 18px;
border-radius:6px;
}

</style>

</head>

<body>

<div id="book">

<div class="page"><img src="pages/1.jpg"></div>
<div class="page"><img src="pages/2.jpg"></div>
<div class="page"><img src="pages/3.jpg"></div>
<div class="page"><img src="pages/4.jpg"></div>
<div class="page"><img src="pages/5.jpg"></div>
<div class="page"><img src="pages/6.jpg"></div>

</div>

<div class="controls">
<button id="prev">◀</button>
<button id="next">▶</button>
</div>

<audio id="flipSound" src="flip.mp3"></audio>

<script>

/* inicia flipbook */

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:400,
height:700,
size:"stretch",
minWidth:300,
maxWidth:600,
minHeight:400,
maxHeight:900,
maxShadowOpacity:0.5,
showCover:true,
mobileScrollSupport:false
}
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

/* som de página */

const sound=document.getElementById("flipSound");

pageFlip.on("flip",()=>{

sound.currentTime=0;
sound.play();

});

/* botões */

document.getElementById("next").onclick=()=>{

pageFlip.flipNext();

}

document.getElementById("prev").onclick=()=>{

pageFlip.flipPrev();

}

</script>

</body>
</html>
